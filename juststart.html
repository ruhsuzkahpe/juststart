<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JUST START</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#f0ece3;font-family:'DM Mono','Courier New',monospace;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#0a0a0a;}::-webkit-scrollbar-thumb{background:#333;}
.btn-primary{background:#e8ff47;color:#0a0a0a;border:none;padding:14px 32px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s;}
.btn-primary:hover{background:#fff;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:#f0ece3;border:1px solid #333;padding:12px 28px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;}
.btn-ghost:hover{border-color:#e8ff47;color:#e8ff47;}
.tag{display:inline-flex;align-items:center;gap:8px;background:#1a1a1a;border:1px solid #2a2a2a;padding:6px 12px;font-size:12px;color:#c8c4bb;margin:4px;}
.tag button{background:none;border:none;color:#666;cursor:pointer;font-size:14px;line-height:1;}
.tag button:hover{color:#e8ff47;}
input[type=text]{background:#111;border:1px solid #2a2a2a;color:#f0ece3;padding:12px 16px;font-family:'DM Mono',monospace;font-size:13px;outline:none;width:100%;transition:border-color 0.2s;}
input[type=text]:focus{border-color:#e8ff47;}
input[type=text]::placeholder{color:#444;}
.card{background:#111;border:1px solid #1e1e1e;padding:20px;transition:border-color 0.2s;}
.card:hover{border-color:#2e2e2e;}
.match-badge{background:#e8ff47;color:#0a0a0a;font-size:11px;font-weight:500;padding:4px 10px;letter-spacing:1px;}
.avatar{width:40px;height:40px;background:#1e1e1e;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888;flex-shrink:0;}
.nav-tab{background:none;border:none;color:#666;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:12px 20px;transition:color 0.2s;border-bottom:2px solid transparent;}
.nav-tab.active{color:#e8ff47;border-bottom-color:#e8ff47;}
.nav-tab:hover:not(.active){color:#aaa;}
.schedule-btn{background:#111;border:1px solid #2a2a2a;color:#888;padding:16px 28px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
.schedule-btn.selected{border-color:#e8ff47;color:#e8ff47;}
.schedule-btn:hover:not(.selected){border-color:#333;color:#ccc;}
.progress-bar{height:2px;background:#1a1a1a;margin-bottom:40px;}
.progress-fill{height:100%;background:#e8ff47;transition:width 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.5s ease forwards;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const mockUsers = [
  {id:1,name:"Ahmet K.",avatar:"AK",music:["Indie Rock","Alternatif"],hobbies:["Fotoğrafçılık","Yürüyüş"],schedule:"gece",wishes:["Kendi şirketimi kurmak","Dünya turu"],match:87},
  {id:2,name:"Selin Y.",avatar:"SY",music:["Indie Rock","Jazz"],hobbies:["Resim","Fotoğrafçılık"],schedule:"sabah",wishes:["Kitap yazmak"],match:74},
  {id:3,name:"Mert D.",avatar:"MD",music:["Hip-Hop","R&B"],hobbies:["Müzik üretmek","Spor"],schedule:"gece",wishes:["Müzisyen olmak","Studio açmak"],match:61},
];

const posts = [
  {id:1,author:"Selin Y.",avatar:"SY",time:"2 saat önce",title:"Freelance'e geçmek istiyorum ama başlayamıyorum",content:"3 yıldır aynı şirkette çalışıyorum. Grafik tasarım konusunda iyiyim ama freelance geçişi nasıl olur bilmiyorum. Deneyimi olan var mı?",replies:12,likes:34},
  {id:2,author:"Mert D.",avatar:"MD",time:"5 saat önce",title:"Ev stüdyosu kuracaklar dikkat — öğrendiklerimi paylaşıyorum",content:"6 aydır home studio kurmaya çalıştım. Çok hata yaptım, çok para harcadım. Başlamak isteyenler için bir liste hazırladım.",replies:28,likes:91},
  {id:3,author:"Ahmet K.",avatar:"AK",time:"1 gün önce",title:"İstanbul'da doğa yürüyüşü yapacak biri var mı?",content:"Bu hafta sonu Belgrad Ormanı'na gitmek istiyorum. Katılmak isteyen var mı? Tecrübe seviyesi önemli değil.",replies:7,likes:19},
];

const onboardingSteps = [
  {key:"music",label:"Müzik tarzın",placeholder:"Örn: Indie Rock, Jazz, Arabesk...",icon:"♪"},
  {key:"food",label:"Sevdiğin yemekler",placeholder:"Örn: Döner, Sushi, Pizza...",icon:"◈"},
  {key:"books",label:"Okuduğun kitaplar",placeholder:"Örn: Suç ve Ceza, Dune...",icon:"◻"},
  {key:"series",label:"İzlediğin diziler",placeholder:"Örn: Breaking Bad, Dark...",icon:"▶"},
  {key:"hobbies",label:"Hobilerin",placeholder:"Örn: Fotoğrafçılık, Spor...",icon:"◆"},
  {key:"wishes",label:"Hayatta istediğin şeyler",placeholder:"Örn: Kendi işimi kurmak...",icon:"✦"},
];

function App() {
  const [screen, setScreen] = useState("landing");
  const [step, setStep] = useState(0);
  const [currentInput, setCurrentInput] = useState("");
  const [tags, setTags] = useState({});
  const [schedule, setSchedule] = useState(null);
  const [activePost, setActivePost] = useState(null);
  const [activeTab, setActiveTab] = useState("feed");

  const addTag = () => {
    const key = onboardingSteps[step]?.key;
    if (!key || !currentInput.trim()) return;
    setTags(prev => ({...prev, [key]: [...(prev[key]||[]), currentInput.trim()]}));
    setCurrentInput("");
  };

  const removeTag = (key, idx) => setTags(prev => ({...prev, [key]: prev[key].filter((_,i)=>i!==idx)}));
  const nextStep = () => step < onboardingSteps.length - 1 ? setStep(step+1) : setStep(onboardingSteps.length);

  return (
    <div style={{fontFamily:"'DM Mono','Courier New',monospace",minHeight:"100vh",background:"#0a0a0a",color:"#f0ece3"}}>

      {screen==="landing" && (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"24px 40px",borderBottom:"1px solid #1a1a1a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:900}}>JUST START</span>
            <button className="btn-ghost" onClick={()=>setScreen("onboarding")}>Giriş Yap</button>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"80px 40px",maxWidth:"700px",margin:"0 auto",width:"100%"}}>
            <div className="fade-up">
              <div style={{fontSize:"11px",letterSpacing:"4px",color:"#555",marginBottom:"24px",textTransform:"uppercase"}}>Türkiye'nin buluşma noktası</div>
              <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(48px,8vw,80px)",fontWeight:900,lineHeight:0.95,letterSpacing:"-2px",marginBottom:"32px"}}>
                Aynı<br/><span style={{color:"#e8ff47"}}>düşüncede</span><br/>olan biri<br/>seni bekliyor.
              </h1>
              <p style={{color:"#666",fontSize:"14px",lineHeight:1.8,marginBottom:"48px",maxWidth:"420px"}}>
                Müziğin, kitapların, hayallerin — seni tanımlayan her şey seni doğru insanlarla buluşturur. Sadece başla.
              </p>
              <div style={{display:"flex",gap:"16px",flexWrap:"wrap"}}>
                <button className="btn-primary" onClick={()=>setScreen("onboarding")}>Profilini Oluştur</button>
                <button className="btn-ghost" onClick={()=>setScreen("app")}>Siteyi Keşfet</button>
              </div>
            </div>
          </div>
          <div style={{padding:"40px",borderTop:"1px solid #1a1a1a",display:"flex",gap:"48px",flexWrap:"wrap"}}>
            {[["2.4K+","Kullanıcı"],["87%","Ort. Eşleşme"],["340+","Başlık"]].map(([num,label])=>(
              <div key={label}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"28px",fontWeight:700,color:"#e8ff47"}}>{num}</div>
                <div style={{fontSize:"11px",color:"#555",letterSpacing:"2px",textTransform:"uppercase",marginTop:"4px"}}>{label}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {screen==="onboarding" && (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",maxWidth:"600px",margin:"0 auto",padding:"40px 24px"}}>
          <div style={{marginBottom:"48px"}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",fontWeight:900}}>JUST START</span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width:`${((step+1)/(onboardingSteps.length+1))*100}%`}}/>
          </div>

          {step < onboardingSteps.length ? (
            <div className="fade-up" key={step}>
              <div style={{fontSize:"11px",letterSpacing:"3px",color:"#555",marginBottom:"12px"}}>{step+1} / {onboardingSteps.length+1}</div>
              <div style={{fontSize:"32px",marginBottom:"8px"}}>{onboardingSteps[step].icon}</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"32px",fontWeight:700,marginBottom:"8px"}}>{onboardingSteps[step].label}</h2>
              <p style={{color:"#555",fontSize:"12px",marginBottom:"32px"}}>Birden fazla ekleyebilirsin</p>
              <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
                <input type="text" placeholder={onboardingSteps[step].placeholder} value={currentInput}
                  onChange={e=>setCurrentInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addTag()} style={{flex:1}}/>
                <button className="btn-primary" onClick={addTag} style={{padding:"12px 20px",letterSpacing:"0"}}>+</button>
              </div>
              <div style={{minHeight:"48px",marginBottom:"40px"}}>
                {(tags[onboardingSteps[step].key]||[]).map((tag,i)=>(
                  <span key={i} className="tag">{tag}<button onClick={()=>removeTag(onboardingSteps[step].key,i)}>×</button></span>
                ))}
              </div>
              <button className="btn-primary" onClick={nextStep}>{step===onboardingSteps.length-1?"Son Adım →":"Devam →"}</button>
            </div>
          ) : (
            <div className="fade-up">
              <div style={{fontSize:"11px",letterSpacing:"3px",color:"#555",marginBottom:"12px"}}>{onboardingSteps.length+1} / {onboardingSteps.length+1}</div>
              <div style={{fontSize:"32px",marginBottom:"8px"}}>◐</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"32px",fontWeight:700,marginBottom:"8px"}}>Sen gece mi, sabah mı?</h2>
              <p style={{color:"#555",fontSize:"12px",marginBottom:"32px"}}>Ritmin seni anlatır</p>
              <div style={{display:"flex",gap:"12px",marginBottom:"40px",flexWrap:"wrap"}}>
                <button className={`schedule-btn ${schedule==="gece"?"selected":""}`} onClick={()=>setSchedule("gece")}>🌙 Gece Kuşu</button>
                <button className={`schedule-btn ${schedule==="sabah"?"selected":""}`} onClick={()=>setSchedule("sabah")}>☀️ Sabah İnsanı</button>
              </div>
              <button className="btn-primary" onClick={()=>setScreen("app")}>Keşfetmeye Başla →</button>
            </div>
          )}
        </div>
      )}

      {screen==="app" && (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"16px 24px",borderBottom:"1px solid #1a1a1a",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#0a0a0a",zIndex:100}}>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",fontWeight:900}}>JUST START</span>
            <div className="avatar">SEN</div>
          </div>
          <div style={{borderBottom:"1px solid #1a1a1a",display:"flex",paddingLeft:"16px"}}>
            {[["feed","Akış"],["matches","Eşleşmeler"],["profile","Profilim"]].map(([key,label])=>(
              <button key={key} className={`nav-tab ${activeTab===key?"active":""}`} onClick={()=>setActiveTab(key)}>{label}</button>
            ))}
          </div>
          <div style={{flex:1,padding:"24px",maxWidth:"700px",margin:"0 auto",width:"100%"}}>

            {activeTab==="feed" && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px"}}>
                  <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"22px"}}>Topluluk</h2>
                  <button className="btn-primary" style={{padding:"10px 20px",fontSize:"11px"}}>+ Başlık Aç</button>
                </div>
                {posts.map(post=>(
                  <div key={post.id} className="card" style={{marginBottom:"12px",cursor:"pointer"}} onClick={()=>setActivePost(post)}>
                    <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                      <div className="avatar">{post.avatar}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px"}}>
                          <span style={{fontSize:"12px",color:"#666"}}>{post.author}</span>
                          <span style={{fontSize:"11px",color:"#444"}}>{post.time}</span>
                        </div>
                        <h3 style={{fontSize:"15px",fontWeight:500,marginBottom:"8px",lineHeight:1.4}}>{post.title}</h3>
                        <p style={{fontSize:"12px",color:"#666",lineHeight:1.6,marginBottom:"12px"}}>{post.content}</p>
                        <div style={{display:"flex",gap:"20px"}}>
                          <span style={{fontSize:"11px",color:"#555"}}>↩ {post.replies} yanıt</span>
                          <span style={{fontSize:"11px",color:"#555"}}>♡ {post.likes}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab==="matches" && (
              <div>
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"22px",marginBottom:"8px"}}>Eşleşmeler</h2>
                <p style={{color:"#555",fontSize:"12px",marginBottom:"24px"}}>Ortak seçimlerinize göre hesaplandı</p>
                {mockUsers.map(user=>(
                  <div key={user.id} className="card" style={{marginBottom:"12px"}}>
                    <div style={{display:"flex",gap:"16px",alignItems:"flex-start"}}>
                      <div className="avatar" style={{width:"48px",height:"48px"}}>{user.avatar}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                          <span style={{fontSize:"15px",fontWeight:500}}>{user.name}</span>
                          <span className="match-badge">%{user.match} benzer</span>
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}}>
                          {[...user.music,...user.hobbies].slice(0,4).map((item,i)=>(
                            <span key={i} style={{fontSize:"11px",color:"#666",background:"#1a1a1a",padding:"4px 10px"}}>{item}</span>
                          ))}
                        </div>
                        <div style={{fontSize:"11px",color:"#555",marginBottom:"12px"}}>
                          {user.schedule==="gece"?"🌙 Gece kuşu":"☀️ Sabah insanı"}
                        </div>
                        <button className="btn-ghost" style={{padding:"8px 20px",fontSize:"11px"}}>Mesaj Gönder</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab==="profile" && (
              <div>
                <div style={{display:"flex",gap:"16px",alignItems:"center",marginBottom:"32px",padding:"20px",background:"#111",border:"1px solid #1e1e1e"}}>
                  <div className="avatar" style={{width:"56px",height:"56px",fontSize:"14px"}}>SEN</div>
                  <div>
                    <div style={{fontSize:"18px",fontWeight:500,marginBottom:"4px"}}>Senin Profil</div>
                    <div style={{fontSize:"11px",color:"#555",letterSpacing:"1px"}}>JUST START üyesi</div>
                  </div>
                </div>
                {onboardingSteps.map(s=>(
                  <div key={s.key} style={{marginBottom:"16px",padding:"16px",background:"#111",border:"1px solid #1e1e1e"}}>
                    <div style={{fontSize:"11px",color:"#555",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px"}}>{s.icon} {s.label}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                      {(tags[s.key]||[]).length>0
                        ? tags[s.key].map((tag,i)=><span key={i} style={{fontSize:"12px",color:"#c8c4bb",background:"#1a1a1a",padding:"5px 12px",border:"1px solid #2a2a2a"}}>{tag}</span>)
                        : <span style={{fontSize:"12px",color:"#444"}}>Henüz eklenmedi</span>}
                    </div>
                  </div>
                ))}
                <div style={{padding:"16px",background:"#111",border:"1px solid #1e1e1e"}}>
                  <div style={{fontSize:"11px",color:"#555",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px"}}>◐ Ritim</div>
                  <span style={{fontSize:"12px",color:"#c8c4bb"}}>{schedule?(schedule==="gece"?"🌙 Gece kuşu":"☀️ Sabah insanı"):"Henüz seçilmedi"}</span>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {activePost && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"24px"}} onClick={()=>setActivePost(null)}>
          <div style={{background:"#111",border:"1px solid #2a2a2a",padding:"28px",maxWidth:"560px",width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"20px"}}>
              <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                <div className="avatar">{activePost.avatar}</div>
                <div>
                  <div style={{fontSize:"13px"}}>{activePost.author}</div>
                  <div style={{fontSize:"11px",color:"#555"}}>{activePost.time}</div>
                </div>
              </div>
              <button onClick={()=>setActivePost(null)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:"20px"}}>×</button>
            </div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",marginBottom:"12px",lineHeight:1.3}}>{activePost.title}</h3>
            <p style={{fontSize:"13px",color:"#888",lineHeight:1.7,marginBottom:"20px"}}>{activePost.content}</p>
            <div style={{borderTop:"1px solid #1e1e1e",paddingTop:"16px"}}>
              <input type="text" placeholder="Yanıtını yaz..." style={{marginBottom:"10px"}}/>
              <button className="btn-primary" style={{padding:"10px 24px",fontSize:"11px"}}>Yanıtla</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
